<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, shrink-to-fit=no"
		/>
		<title>全域知识共享平台</title>

		<link rel="icon" href="data:," />

		<script src="/scram/scramjet.all.js"></script>
		<script src="/baremux/index.js"></script>

		<link rel="stylesheet" href="index.css" />
		<script src="register-sw.js" defer></script>
		<script src="search.js" defer></script>
		<script src="index.js" defer></script>
	</head>

	<body>
		<main class="landing">
			<header class="landing-header">
				<h1 class="landing-title">建设全域知识共享平台</h1>
				<p class="landing-subtitle">打造科研信息服务新生态</p>
			</header>

			<form id="sj-form" class="landing-form">
				<input
					id="sj-search-engine"
					value="https://www.google.com/search?q=%s"
					type="hidden"
				/>
				<input
					id="sj-address"
					type="text"
					placeholder="输入网址或搜索关键词"
					autocomplete="off"
					autofocus
				/>
			</form>

			<section class="landing-examples">
				<p class="landing-examples-hint">常用学术与研究资源</p>
				<div class="landing-chips">
					<button type="button" class="chip" data-url="https://www.google.com/">Google 搜索</button>
					<button type="button" class="chip" data-url="https://scholar.google.com/">谷歌学术</button>
					<button type="button" class="chip" data-url="https://patents.google.com/">谷歌专利</button>
					<button type="button" class="chip" data-url="https://translate.google.com/">谷歌翻译</button>
					<button type="button" class="chip" data-url="https://mail.google.com/">Gmail</button>
					<button type="button" class="chip" data-url="https://www.youtube.com/">YouTube</button>
					<button type="button" class="chip" data-url="https://github.com/">GitHub</button>
				</div>
			</section>

			<div class="landing-error">
				<p id="sj-error"></p>
				<pre id="sj-error-code"></pre>
			</div>
		</main>

		<script>
			document.querySelectorAll(".chip").forEach((btn) => {
				btn.addEventListener("click", () => {
					const input = document.getElementById("sj-address");
					input.value = btn.dataset.url;
					document.getElementById("sj-form").requestSubmit();
				});
			});
		</script>
	</body>
</html>
